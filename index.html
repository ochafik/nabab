<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nabab — Bayesian Network Viewer</title>
  <style>
    :root {
      --bg: #ffffff;
      --bg-surface: #f5f6f8;
      --bg-node: #ffffff;
      --bg-bar: #e8eaed;
      --border: #dadce0;
      --border-node: #c4c7cc;
      --text: #1f2937;
      --text-secondary: #6b7280;
      --text-dim: #9ca3af;
      --accent: #2563eb;
      --accent-soft: #f59e0b;
      --accent-hard: #dc2626;
      --edge: #9ca3af;
      --fill-bar: #2563eb;
      --fill-bar-hard: #dc2626;
      --fill-bar-soft: #f59e0b;
      --thumb: #ffffff;
      --thumb-stroke: #2563eb;
      --node-shadow: rgba(0,0,0,0.08);
      --header-bg: #f9fafb;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #0f1117;
        --bg-surface: #1a1d27;
        --bg-node: #1e2130;
        --bg-bar: #2a2d3a;
        --border: #333646;
        --border-node: #3f4354;
        --text: #e5e7eb;
        --text-secondary: #9ca3af;
        --text-dim: #6b7280;
        --accent: #60a5fa;
        --accent-soft: #fbbf24;
        --accent-hard: #f87171;
        --edge: #4b5563;
        --fill-bar: #3b82f6;
        --fill-bar-hard: #ef4444;
        --fill-bar-soft: #f59e0b;
        --thumb: #e5e7eb;
        --thumb-stroke: #3b82f6;
        --node-shadow: rgba(0,0,0,0.3);
        --header-bg: #161822;
      }
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      display: flex;
      flex-direction: column;
    }
    header {
      background: var(--header-bg);
      padding: 8px 16px;
      display: flex;
      align-items: center;
      gap: 12px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    header h1 { font-size: 16px; font-weight: 700; }
    header .info { font-size: 12px; color: var(--text-secondary); }
    .toolbar {
      background: var(--header-bg);
      padding: 6px 16px;
      display: flex;
      gap: 8px;
      align-items: center;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .toolbar button, .toolbar select {
      background: var(--bg-surface);
      color: var(--text);
      border: 1px solid var(--border);
      padding: 4px 10px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 12px;
    }
    .toolbar button:hover { background: var(--border); }
    .toolbar button.active { background: var(--accent); color: #fff; border-color: var(--accent); }
    .toolbar .hint { font-size: 11px; color: var(--text-dim); }
    #graph-container {
      flex: 1;
      overflow: hidden;
      position: relative;
      background: var(--bg);
    }
    #graph-container svg { width: 100%; height: 100%; }

    /* Unified info panel */
    #info-panel {
      display: none;
      position: fixed;
      bottom: 16px;
      right: 16px;
      width: 380px;
      max-height: 50vh;
      background: var(--bg-surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 12px;
      color: var(--text);
      box-shadow: 0 4px 16px var(--node-shadow);
      z-index: 100;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }
    #info-panel.visible { display: flex; }
    .panel-tabs {
      display: flex;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      overflow-x: auto;
    }
    .panel-tab {
      padding: 7px 12px;
      background: none;
      border: none;
      font-size: 11px;
      font-weight: 600;
      color: var(--text-secondary);
      cursor: pointer;
      border-bottom: 2px solid transparent;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .panel-tab.active { color: var(--accent); border-bottom-color: var(--accent); }
    .panel-tab:hover { background: var(--bg-bar); }
    .panel-content { padding: 8px 12px; overflow: auto; flex: 1; min-height: 0; }
    .panel-content .panel-title {
      font-weight: 700; font-size: 13px; margin-bottom: 6px; color: var(--accent);
    }
    .info-panel-body { overflow: auto; flex: 1; min-height: 0; }
    /* CPT table styles */
    .cpt-title { font-weight: 700; font-size: 13px; margin-bottom: 8px; color: var(--accent); }
    .cpt-table { border-collapse: collapse; width: 100%; }
    .cpt-table th, .cpt-table td { padding: 3px 8px; text-align: right; white-space: nowrap; }
    .cpt-table th { font-weight: 600; border-bottom: 2px solid var(--border); color: var(--text); background: var(--header-bg); }
    .cpt-table td { border-bottom: 1px solid var(--border); color: var(--text-secondary); }
    .cpt-parent-col { text-align: left; color: var(--text); font-weight: 500; }
    .cpt-separator { border-right: 2px solid var(--border); }

    /* Export dropdown */
    .export-wrapper {
      position: relative;
      display: inline-block;
    }
    .export-menu {
      display: none;
      position: absolute;
      top: 100%;
      left: 0;
      margin-top: 2px;
      background: var(--bg-surface);
      border: 1px solid var(--border);
      border-radius: 4px;
      box-shadow: 0 4px 12px var(--node-shadow);
      z-index: 200;
      min-width: 140px;
    }
    .export-menu.visible { display: block; }
    .export-menu button {
      display: block;
      width: 100%;
      text-align: left;
      background: none;
      border: none;
      padding: 6px 12px;
      font-size: 12px;
      color: var(--text);
      cursor: pointer;
    }
    .export-menu button:hover { background: var(--border); }

    .voi-row, .tornado-row {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 4px 0;
      border-bottom: 1px solid var(--border);
      cursor: pointer;
    }
    .voi-row:hover, .tornado-row:hover { background: var(--bg-bar); }
    .voi-row:last-child, .tornado-row:last-child { border-bottom: none; }
    .voi-name { flex: 1; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .voi-bar { width: 80px; height: 8px; background: var(--bg-bar); border-radius: 4px; overflow: hidden; flex-shrink: 0; }
    .voi-bar-fill { height: 100%; border-radius: 4px; }
    .voi-value { width: 48px; text-align: right; font-size: 11px; color: var(--text-secondary); flex-shrink: 0; }
    .tornado-param { flex: 1; font-size: 11px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .tornado-range { width: 100px; height: 10px; background: var(--bg-bar); border-radius: 5px; overflow: hidden; position: relative; flex-shrink: 0; }
    .tornado-range-fill { height: 100%; position: absolute; border-radius: 5px; }
  </style>
</head>
<body>
  <header>
    <h1>Nabab</h1>
    <span class="info" id="network-name">No network loaded</span>
  </header>
  <div class="toolbar">
    <button id="btn-load-example">Load Example</button>
    <select id="example-select">
      <optgroup label="XMLBIF Examples">
        <option value="dogproblem.xmlbif">Dog Problem</option>
        <option value="alarm.xml">Alarm</option>
        <option value="car-starts.xml">Car Starts</option>
        <option value="car-starts-light.xml">Car Starts Light</option>
        <option value="simple.xml">Simple</option>
        <option value="simple2.xml">Simple 2</option>
        <option value="example1.xml">Example 1</option>
        <option value="example2.xml">Example 2</option>
        <option value="example3.xml">Example 3</option>
        <option value="example4.xml">Example 4</option>
        <option value="example5.xml">Example 5</option>
        <option value="example6.xml">Example 6</option>
        <option value="example7.xml">Example 7</option>
        <option value="example8.xml">Example 8</option>
        <option value="example9.xml">Example 9</option>
        <option value="example10.xml">Example 10</option>
        <option value="Graph1.xml">Graph 1</option>
      </optgroup>
      <optgroup label="BIF Benchmarks — Small (≤20 nodes)">
        <option value="bench/asia.bif">Asia (8 nodes)</option>
        <option value="bench/sachs.bif">Sachs (11 nodes)</option>
        <option value="bench/child.bif">Child (20 nodes)</option>
      </optgroup>
      <optgroup label="BIF Benchmarks — Medium (20–50 nodes)">
        <option value="bench/insurance.bif">Insurance (27 nodes)</option>
        <option value="bench/water.bif">Water (32 nodes)</option>
        <option value="bench/mildew.bif">Mildew (35 nodes)</option>
        <option value="bench/alarm.bif">Alarm [BIF] (37 nodes)</option>
        <option value="bench/barley.bif">Barley (48 nodes)</option>
      </optgroup>
      <optgroup label="BIF Benchmarks — Large (50+ nodes)">
        <option value="bench/hailfinder.bif">Hailfinder (56 nodes)</option>
        <option value="bench/hepar2.bif">Hepar2 (70 nodes)</option>
        <option value="bench/win95pts.bif">Win95pts (76 nodes)</option>
        <option value="bench/pathfinder.bif">Pathfinder (109 nodes)</option>
        <option value="bench/munin1.bif">Munin1 (186 nodes)</option>
        <option value="bench/andes.bif">Andes (223 nodes, slow)</option>
        <option value="bench/diabetes.bif">Diabetes (413 nodes, slow)</option>
        <option value="bench/pigs.bif">Pigs (441 nodes, slow)</option>
        <option value="bench/link.bif">Link (724 nodes, slow)</option>
      </optgroup>
      <optgroup label="CSV Datasets (learn structure)">
        <option value="bench/weather.csv">Weather (5 vars, 200 rows)</option>
        <option value="bench/students.csv">Students (5 vars, 300 rows)</option>
      </optgroup>
    </select>
    <button id="btn-layout">Auto Layout</button>
    <button id="btn-fit">Fit View</button>
    <button id="btn-clear-evidence">Clear Evidence</button>
    <button id="btn-sensitivity" title="Toggle sensitivity analysis: select a node to see which variables and parameters influence it most">Sensitivity</button>
    <span class="export-wrapper">
      <button id="btn-export">Export</button>
      <span class="export-menu" id="export-menu">
        <button id="btn-export-xmlbif">Export XMLBIF</button>
        <button id="btn-export-json">Export JSON</button>
      </span>
    </span>
    <span class="hint">Click name to cycle | Drag slider for soft evidence | Eye toggles | Drop .xml/.bif files to load | Drop .csv to learn structure</span>
  </div>
  <div id="graph-container"></div>
  <div id="info-panel">
    <div class="panel-tabs" id="info-tabs"></div>
    <div class="info-panel-body" id="info-body"></div>
  </div>
  <script type="module" src="/src/viewer/main.ts"></script>
</body>
</html>
